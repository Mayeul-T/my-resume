about:
  description: |
    Je suis un développeur Full Stack passionné basé à Paris, France. Avec plus de 5 ans d'expérience en développement web, je me spécialise dans la création d'applications modernes, scalables et conviviales.

    J'aime résoudre des problèmes complexes et transformer des idées en réalité grâce à un code propre et efficace. Quand je ne code pas, vous pouvez me trouver en train d'explorer de nouvelles technologies, de contribuer à l'open source ou de partager mes connaissances avec la communauté des développeurs.
  highlights:
    - Plus de 5 ans d'expérience professionnelle
    - Expert en React, Node.js et TypeScript
    - Fort accent sur la performance et l'accessibilité
    - Contributeur open source

