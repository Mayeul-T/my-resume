name: Test, Build & Deploy

on:
  push:
    branches: [mayeul-t]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ==========================================
  # Job 1: Run Tests (required before anything else)
  # ==========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

  # ==========================================
  # Job 2: Build & Push Docker Image
  # ==========================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test # Tests must pass first
    if: github.event_name == 'push' && github.ref == 'refs/heads/mayeul-t'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_name: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Create storage files from variables
        env:
          RESUME_EN: ${{ vars.RESUME_EN }}
          RESUME_FR: ${{ vars.RESUME_FR }}
        run: |
          mkdir -p storage/assets
          echo "$RESUME_EN" > storage/resume.en.yml
          echo "$RESUME_FR" > storage/resume.fr.yml
          # Note: Images are managed via mounted volume on VPS (/opt/my-resume/storage/assets/)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Job 3: Deploy to VPS
  # ==========================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/mayeul-t'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/my-resume"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image_name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_NAME
          script: |
            # Login to GitHub Container Registry
            echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Navigate to app directory
            cd /opt/my-resume

            # Export for docker-compose
            export GITHUB_REPOSITORY=$IMAGE_NAME

            # Pull and restart the container
            docker compose pull
            docker compose up -d

            # Clean up old images
            docker image prune -f
